<svg width="520" height="180" viewBox="0 0 520 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Demo mode illustration</title>
  <desc id="desc">Animated card showing a demo AI ad generation state.</desc>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#E4E0D7" stroke-width="1"/>
    </pattern>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1F6B68" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#1F6B68" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1F6B68" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2F3E46" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="520" height="180" rx="8" fill="#F7F5F0"/>
  <rect width="520" height="180" rx="8" fill="url(#grid)" opacity="0.8"/>

  <g filter="url(#softShadow)">
    <rect x="34" y="30" width="452" height="120" rx="8" fill="#FFFEFB" stroke="#D8D5CB"/>
    <rect x="34" y="30" width="452" height="34" rx="8" fill="#FFFFFF" stroke="#D8D5CB"/>
    <path d="M34 64H486" stroke="#D8D5CB"/>
  </g>

  <text x="56" y="52" fill="#17202C" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">DEMO MODE</text>
  <text x="384" y="52" fill="#1F6B68" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">READY</text>

  <rect x="56" y="84" width="235" height="9" rx="4.5" fill="#334155" opacity="0.2"/>
  <rect x="56" y="102" width="310" height="9" rx="4.5" fill="#334155" opacity="0.16"/>
  <rect x="56" y="120" width="185" height="9" rx="4.5" fill="#334155" opacity="0.14"/>

  <rect x="388" y="86" width="64" height="28" rx="14" fill="#F0B84F"/>
  <text x="404" y="104" fill="#17202C" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="900">CTA</text>

  <g>
    <circle cx="344" cy="119" r="5" fill="#1F6B68">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="364" cy="119" r="5" fill="#1F6B68">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="384" cy="119" r="5" fill="#1F6B68">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="-160" y="30" width="120" height="120" fill="url(#shine)">
    <animate attributeName="x" values="-160;560" dur="3.2s" repeatCount="indefinite"/>
  </rect>
</svg>
